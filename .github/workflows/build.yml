# 在 macOS / Windows / Linux 上分别打包，产物上传为 artifacts（不发 Release）。
# 触发：手动 workflow_dispatch，或推送到主分支 / PR。
# 本地脚本：pnpm tauri:build:ci / pnpm tauri:build:windows / pnpm tauri:build:linux
#
# 注意：CI Build 关闭 createUpdaterArtifacts（不需签名密钥）。
# 带 .sig / latest.json 的发版走 Release workflow。
name: Build Windows / macOS / Linux

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-tauri:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            name: macos-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            name: macos-x64
          - platform: ubuntu-22.04
            args: ""
            name: linux-x64
          - platform: windows-latest
            args: ""
            name: windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # PR/日常构建不签名；避免缺 TAURI_SIGNING_PRIVATE_KEY 失败
          args: >-
            ${{ matrix.args }}
            --config {"bundle":{"createUpdaterArtifacts":false}}
          projectPath: .

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: devkit-${{ matrix.name }}
          path: |
            src-tauri/target/**/release/bundle/**
            src-tauri/target/release/bundle/**
          if-no-files-found: warn
          retention-days: 14
