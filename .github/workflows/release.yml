# 打 tag（v*）或手动触发：构建签名安装包并发布到 GitHub Release（含 latest.json）。
# 需在仓库 Secrets 配置：
#   TAURI_SIGNING_PRIVATE_KEY          （~/.tauri/devkit.key 全文）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD （可选；无密码可不设）
#
# 客户端 endpoint：
#   https://github.com/9527-tb/devkit/releases/latest/download/latest.json
#
# 注意：必须发布正式 Release（非 draft），否则 /releases/latest 不可用。
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing secret TAURI_SIGNING_PRIVATE_KEY. Add the contents of ~/.tauri/devkit.key in repo Settings → Secrets."
            exit 1
          fi

      - name: Build and publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v__VERSION__' }}
          releaseName: DevKit v__VERSION__
          releaseBody: |
            ## DevKit v__VERSION__

            Installers and updater artifacts are attached.
            App updater reads `latest.json` from this release.
          # 正式发布（非 draft），否则客户端 /releases/latest/download/latest.json 无法访问
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  # tauri-action 合并的 latest.json 可能缺平台或使用 api.github.com URL（公开客户端 403）。
  # 按 Release 资产完整重建，URL 一律用 browser_download_url。
  fix-updater-json:
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild latest.json from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG=$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)
          fi
          echo "Rebuilding latest.json on $TAG"
          node scripts/rebuild-latest-json.mjs "$TAG"
          # 清理历史误上传的文件名（旧脚本曾传成 devkit-latest-<tag>.json）
          gh release delete-asset "$TAG" "devkit-latest-${TAG}.json" --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          # 公开 CDN 可能短暂缓存旧内容，重试抽查
          ok=0
          for i in 1 2 3 4 5 6; do
            body=$(curl -fsSL "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/latest.json" || true)
            if [ -z "$body" ]; then
              echo "CDN not ready (attempt $i), sleeping..."
              sleep 5
              continue
            fi
            if printf '%s' "$body" | grep -q 'api.github.com/repos/.*/releases/assets/'; then
              echo "Still has API URLs (attempt $i), sleeping..."
              sleep 5
              continue
            fi
            if ! printf '%s' "$body" | grep -q '"darwin-aarch64"'; then
              echo "Missing darwin-aarch64 (attempt $i), sleeping..."
              sleep 5
              continue
            fi
            ok=1
            break
          done
          if [ "$ok" != "1" ]; then
            echo "::error::latest.json invalid on public CDN (API URLs or missing darwin)"
            exit 1
          fi
          echo "Verified complete latest.json with browser download URLs"
