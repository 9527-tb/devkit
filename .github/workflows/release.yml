# 打 tag（v*）或手动触发：构建签名安装包并发布到 GitHub Release（含 latest.json）。
# 需在仓库 Secrets 配置：
#   TAURI_SIGNING_PRIVATE_KEY          （~/.tauri/devkit.key 全文）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD （可选；无密码可不设）
#
# 客户端 endpoint：
#   https://github.com/9527-tb/devkit/releases/latest/download/latest.json
#
# 注意：必须发布正式 Release（非 draft），否则 /releases/latest 不可用。
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify updater signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing secret TAURI_SIGNING_PRIVATE_KEY. Add the contents of ~/.tauri/devkit.key in repo Settings → Secrets."
            exit 1
          fi

      - name: Build and publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v__VERSION__' }}
          releaseName: DevKit v__VERSION__
          releaseBody: |
            ## DevKit v__VERSION__

            Installers and updater artifacts are attached.
            App updater reads `latest.json` from this release.
          # 正式发布（非 draft），否则客户端 /releases/latest/download/latest.json 无法访问
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
